<!DOCTYPE html>
<html>
<head>
    <title>My Profile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            scroll-behavior: smooth;
        }

        /* Navigation */
        nav {
            background: #222;
            padding: 15px;
            position: fixed;
            width: 100%;
            top: 0;
        }

        nav ul {
            list-style: none;
            display: flex;
            justify-content: center;
        }

        nav ul li {
            margin: 0 20px;
        }

        nav ul li a {
            text-decoration: none;
            color: white;
            font-weight: bold;
            transition: 0.3s;
        }

        nav ul li a:hover {
            color: #00c3ff;
        }

        /* Sections */
        section {
            padding: 100px 20px;
            text-align: center;
            min-height: 100vh;
        }

        #home {
            background: linear-gradient(to right, #4e73df, #1cc88a);
            color: white;
        }

        #skills {
            background: #f4f4f4;
        }

        #contact {
            background: #222;
            color: white;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 40px;
        }

        p {
            font-size: 18px;
            margin-bottom: 20px;
        }

        /* Skills */
        .skill-box {
            width: 60%;
            margin: 10px auto;
            background: #ddd;
            border-radius: 20px;
            overflow: hidden;
        }

        .skill-level {
            height: 25px;
            background: #4e73df;
            text-align: right;
            padding-right: 10px;
            line-height: 25px;
            color: white;
            font-size: 14px;
        }

        /* Contact */
        .contact-info p {
            margin: 10px 0;
        }

        /* Responsive */
        @media(max-width: 768px){
            nav ul {
                flex-direction: column;
                text-align: center;
            }

            .skill-box {
                width: 90%;
            }
        }
    </style>
</head>

<body>

    <!-- Navigation -->
    <nav>
        <ul>
            <li><a href="#home">Home</a></li>
            <li><a href="#skills">Skills</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>

    <!-- Home Section -->
    <section id="home">
        <h1>N SHARATH</h1>
        <p>B.Tech Student | AI & DS</p>
        <p>A passionate learner aiming to build strong technical skills.</p>
    </section>

    <!-- Skills Section -->
    <section id="skills">
        <h1>My Skills</h1>

        <p>HTML</p>
        <div class="skill-box">
            <div class="skill-level" style="width: 80%;">80%</div>
        </div>

        <p>CSS</p>
        <div class="skill-box">
            <div class="skill-level" style="width: 70%;">70%</div>
        </div>

        <p>Java</p>
        <div class="skill-box">
            <div class="skill-level" style="width: 65%;">65%</div>
        </div>

        <p>Data Structures</p>
        <div class="skill-box">
            <div class="skill-level" style="width: 60%;">60%</div>
        </div>

        <p> Fwd</p>
        <div class="skill-box">
            <div class="skill-level" style="width: 60%;">60%</div>
        </div>
       
    </section>

    <!-- Contact Section -->
    <section id="contact">
        <h1>Contact Me</h1>
        <div class="contact-info">
            <p>Email: sharath@email.com</p>
            <p>Phone: 9876543210</p>
            <p>Location: India</p>
        </div>
    </section>

</body>
</html>
